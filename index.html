<!doctype html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .movie-card {
            display: inline-block;
            vertical-align: top;
            margin: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-family: sans-serif;
            text-align: center;
            padding-bottom: 10px;
        }
        .movie-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }
        .movie-card h2 {
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .movie-card p {
            color: #666;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
    const container = document.getElementById('app');

    const Movie = (props) => {
        return (
            <div className="movie-card">
                <img src={props.image} alt={props.title} />
                <h2>{props.title}</h2>
                <p>Год выпуска: {props.year}</p>
            </div>
        );
    };

    const App = (
        <div>
            <div style={{ display: 'flex', justifyContent: 'center', flexWrap: 'wrap' }}>
                <Movie
                    title="Человек-паук: Возвращение домой"
                    year="2017"
                    image="https://static.okko.tv/images/v4/7d734b8c-42dc-479f-8b0d-08e7df8c12cd"
                />
                <Movie
                    title="Оно"
                    year="2017"
                    image="https://upload.wikimedia.org/wikipedia/ru/f/ff/%D0%9E%D0%BD%D0%BE_%28%D0%BF%D0%BE%D1%81%D1%82%D0%B5%D1%80_%D1%84%D0%B8%D0%BB%D1%8C%D0%BC%D0%B0%2C_2017%29.jpg"
                />
                <Movie
                    title="Темный рыцарь"
                    year="2008"
                    image="https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_.jpg"
                />
            </div>
        </div>
    );

    ReactDOM.createRoot(container).render(App);

</script>

</body>
</html>
